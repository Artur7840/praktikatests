<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h1>Вход в систему</h1></header>
    <main style="justify-content: center;">
        <form id="loginForm" style="max-width: 400px;">
            <h3>Вход</h3>
            <input type="email" id="loginEmail" placeholder="Email" required autofocus>
            <input type="password" id="loginPassword" placeholder="Пароль" required>
            <button type="submit">Войти</button>
            <p style="margin-top:1rem;">Тестовый пользователь: student@example.com / student</p>
            <p><a href="register.html">Нет аккаунта? Зарегистрироваться</a></p>
        </form>
    </main>
    <script>
        const API_BASE = '/api';
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                const response = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                if (response.ok && data.access_token) {
                    localStorage.setItem('access_token', data.access_token);
                    window.location.href = 'index.html';
                } else {
                    alert('Ошибка входа: ' + (data.msg || 'неверный email или пароль'));
                }
            } catch (err) {
                alert('Ошибка соединения: ' + err.message);
            }
        });
    </script>
</body>
</html>

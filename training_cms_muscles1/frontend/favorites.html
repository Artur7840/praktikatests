<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Избранные упражнения</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Принудительная сетка для избранного */
        #favoritesContainer.cards-grid {
            display: grid !important;
            grid-template-columns: repeat(4, 1fr) !important;
            gap: 1.8rem !important;
        }
        @media (max-width: 1200px) {
            #favoritesContainer.cards-grid {
                grid-template-columns: repeat(3, 1fr) !important;
            }
        }
        @media (max-width: 900px) {
            #favoritesContainer.cards-grid {
                grid-template-columns: repeat(2, 1fr) !important;
            }
        }
        @media (max-width: 600px) {
            #favoritesContainer.cards-grid {
                grid-template-columns: 1fr !important;
            }
        }
        /* Гарантия, что карточки не растягиваются на всю ширину */
        .exercise-card {
            width: auto !important;
            max-width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <h1>⭐ Избранное</h1>
        <nav>
            <a href="index.html">Упражнения</a>
            <a href="favorites.html">Избранное</a>
            <a href="my_workouts.html">Тренировки</a>
            <a href="create_workout.html">+ Новая</a>
            <span id="authButton"></span>
        </nav>
    </header>
    <main>
        <div id="favoritesContainer" class="cards-grid"></div>
    </main>
    <script src="app.js"></script>
    <script>
        async function loadFavorites() {
            const container = document.getElementById('favoritesContainer');
            if (!container) return;
            const favIds = getFavorites();
            if (favIds.length === 0) {
                container.innerHTML = '<p style="grid-column:1/-1;">Нет избранных упражнений. Добавьте на главной странице.</p>';
                return;
            }
            const allExercises = await fetchJson('/api/exercises');
            const favExercises = allExercises.filter(ex => favIds.includes(ex.id));
            if (favExercises.length === 0) {
                container.innerHTML = '<p style="grid-column:1/-1;">Избранные упражнения не найдены.</p>';
                return;
            }
            container.innerHTML = favExercises.map(ex => `
                <div class="exercise-card">
                    <img src="${ex.photo_url}" alt="${ex.name}" onerror="this.src='https://via.placeholder.com/300?text=No+Image'">
                    <div class="card-body">
                        <h3>${escapeHtml(ex.name)}</h3>
                        <span class="difficulty">${ex.difficulty}</span>
                        <p>${ex.description || ''}</p>
                        <a href="exercise.html?id=${ex.id}">Подробнее →</a>
                        <button onclick="removeFromFav(${ex.id})" style="background:#c0392b;">🗑️ Удалить</button>
                    </div>
                </div>
            `).join('');
            // Повторно убеждаемся, что класс cards-grid есть (на всякий случай)
            container.classList.add('cards-grid');
        }
        async function removeFromFav(exId) {
            removeFavorite(exId);
            loadFavorites();
        }
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
        loadFavorites();
    </script>
</body>
</html>

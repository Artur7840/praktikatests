<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h1>Регистрация</h1></header>
    <main style="justify-content: center;">
        <form id="registerForm" style="max-width: 400px;">
            <h3>Создать аккаунт</h3>
            <input type="email" id="regEmail" placeholder="Email" required autofocus>
            <input type="password" id="regPassword" placeholder="Пароль" required>
            <button type="submit">Зарегистрироваться</button>
            <p style="margin-top:1rem;">Уже есть аккаунт? <a href="login.html">Войти</a></p>
        </form>
    </main>
    <script>
        const API_BASE = '/api';
        async function fetchJson(url, options) {
            const res = await fetch(url, {
                headers: { 'Content-Type': 'application/json' },
                ...options
            });
            return res.json();
        }
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            try {
                const data = await fetchJson('/api/register', {
                    method: 'POST',
                    body: JSON.stringify({ email, password })
                });
                if (data.msg === 'User created successfully') {
                    alert('Регистрация успешна! Теперь войдите.');
                    window.location.href = 'login.html';
                } else {
                    alert('Ошибка: ' + (data.msg || 'неизвестная ошибка'));
                }
            } catch (err) {
                alert('Ошибка соединения: ' + err.message);
            }
        });
    </script>
</body>
</html>
